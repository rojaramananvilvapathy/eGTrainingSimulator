name: "🚀 eGTraining CI/CD Pipeline"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: Action to perform
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - destroy

env:
  DROPLET_NAME: egtraining-sim001-2vcpu-4gb-amd-blr1
  DROPLET_REGION: blr1
  DROPLET_SIZE: s-2vcpu-4gb-amd
  DROPLET_IMAGE: docker-20-04
  APP_PORT: 4000
  DOCKER_TAG: egtrainingsimulator

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Build frontend
        run: npm run build --workspace=frontend
      - name: Build Docker image
        run: docker build -t ${{ env.DOCKER_TAG }}:${{ github.sha }} .
      - name: Save image
        run: docker save ${{ env.DOCKER_TAG }}:${{ github.sha }} | gzip > image.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 1

  provision:
    name: Provision Droplet
    runs-on: ubuntu-latest
    needs: build
    outputs:
      droplet_ip: ${{ steps.get_ip.outputs.ip }}
    steps:
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Check droplet
        id: check_droplet
        run: |
          IP=$(doctl compute droplet list --format Name,PublicIPv4 --no-header | grep "${{ env.DROPLET_NAME }}" | awk '{print $2}')
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "exists=$([ -n \"$IP\" ] && echo true || echo false)" >> $GITHUB_OUTPUT
      - name: Create droplet if missing
        if: steps.check_droplet.outputs.exists == 'false'
        run: |
          doctl compute droplet create ${{ env.DROPLET_NAME }} \
            --region ${{ env.DROPLET_REGION }} \
            --size ${{ env.DROPLET_SIZE }} \
            --image ${{ env.DROPLET_IMAGE }} \
            --ssh-keys ${{ secrets.DO_SSH_KEY_FINGERPRINT }} \
            --tag-names egtraining,ci-managed \
            --wait
          sleep 30
      - name: Get IP
        id: get_ip
        run: |
          IP=$(doctl compute droplet list --format Name,PublicIPv4 --no-header | grep "${{ env.DROPLET_NAME }}" | awk '{print $2}')
          echo "ip=$IP" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build, provision]
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ needs.provision.outputs.droplet_ip }} >> ~/.ssh/known_hosts 2>/dev/null
      - name: Prepare droplet
        run: ssh -i ~/.ssh/id_rsa root@${{ needs.provision.outputs.droplet_ip }} "mkdir -p /opt/egtraining"
      - name: Copy files
        run: |
          scp -i ~/.ssh/id_rsa docker-compose.prod.yml root@${{ needs.provision.outputs.droplet_ip }}:/opt/egtraining/docker-compose.yml
          scp -i ~/.ssh/id_rsa image.tar.gz root@${{ needs.provision.outputs.droplet_ip }}:/opt/egtraining/
          scp -i ~/.ssh/id_rsa nginx.conf root@${{ needs.provision.outputs.droplet_ip }}:/opt/egtraining/nginx.conf
      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_rsa root@${{ needs.provision.outputs.droplet_ip }} bash -s << 'ENDSSH'
          set -e
          cd /opt/egtraining
          docker load < image.tar.gz
          docker compose down --remove-orphans 2>/dev/null || true
          IMAGE_TAG=${{ github.sha }} docker compose up -d
          docker image prune -f
          docker compose ps
          ENDSSH
      - name: Health check
        run: |
          IP=${{ needs.provision.outputs.droplet_ip }}
          sleep 20
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://$IP:${{ env.APP_PORT }}/health || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [[ "$STATUS" == "200" ]]; then
              echo "App is UP: http://$IP:${{ env.APP_PORT }}"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed"
          exit 1
      - name: Summary
        if: always()
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "| App URL | http://${{ needs.provision.outputs.droplet_ip }}:${{ env.APP_PORT }} |" >> $GITHUB_STEP_SUMMARY

  destroy:
    name: Destroy Droplet
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'
    steps:
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - run: doctl compute droplet delete ${{ env.DROPLET_NAME }} --force
