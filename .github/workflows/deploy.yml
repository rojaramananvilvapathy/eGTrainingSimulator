name: 🚀 eGTraining CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - destroy
          - create-and-deploy

env:
  DROPLET_NAME: egtraining-sim001-2vcpu-4gb-amd-blr1
  DROPLET_REGION: blr1
  DROPLET_SIZE: s-2vcpu-4gb-amd
  DROPLET_IMAGE: docker-20-04          # DigitalOcean Docker on Ubuntu 22.04 slug
  APP_PORT: 4000
  DOCKER_TAG: eGTrainingSimulator

jobs:
  # ─────────────────────────────────────────────────
  # JOB 1: Build & Test
  # ─────────────────────────────────────────────────
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    outputs:
      droplet_ip: ${{ steps.get_ip.outputs.ip }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      # Install & test backend
      - name: Install backend dependencies
        run: npm ci

      - name: Run backend tests (if any)
        run: npm test --if-present

      # Install & build React frontend (adjust path if different)
      - name: Install frontend dependencies
        run: |
          if [ -d "frontend" ]; then
            cd frontend && npm ci
          fi

      - name: Build React frontend
        run: |
          if [ -d "frontend" ]; then
            cd frontend && npm run build
          fi

      # Build Docker image to catch any errors early
      - name: Build Docker image
        run: docker build -t ${{ env.DOCKER_TAG }}:${{ github.sha }} .

      - name: Save Docker image as artifact
        run: docker save ${{ env.DOCKER_TAG }}:${{ github.sha }} | gzip > image.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 1

  # ─────────────────────────────────────────────────
  # JOB 2: Provision Droplet (only if needed)
  # ─────────────────────────────────────────────────
  provision:
    name: 🌊 Provision DigitalOcean Droplet
    runs-on: ubuntu-latest
    needs: build
    outputs:
      droplet_ip: ${{ steps.get_ip.outputs.ip }}

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Check if droplet already exists
        id: check_droplet
        run: |
          IP=$(doctl compute droplet list --format Name,PublicIPv4 --no-header \
               | grep "${{ env.DROPLET_NAME }}" | awk '{print $2}')
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "exists=$([ -n "$IP" ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Create droplet if it doesn't exist
        if: steps.check_droplet.outputs.exists == 'false'
        run: |
          echo "🆕 Creating new droplet..."
          doctl compute droplet create ${{ env.DROPLET_NAME }} \
            --region ${{ env.DROPLET_REGION }} \
            --size ${{ env.DROPLET_SIZE }} \
            --image ${{ env.DROPLET_IMAGE }} \
            --ssh-keys ${{ secrets.DO_SSH_KEY_FINGERPRINT }} \
            --tag-names egtraining,ci-managed \
            --wait
          echo "⏳ Waiting for droplet to be ready..."
          sleep 30

      - name: Get droplet IP
        id: get_ip
        run: |
          IP=$(doctl compute droplet list --format Name,PublicIPv4 --no-header \
               | grep "${{ env.DROPLET_NAME }}" | awk '{print $2}')
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "✅ Droplet IP: $IP"

  # ─────────────────────────────────────────────────
  # JOB 3: Deploy
  # ─────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy Application
    runs-on: ubuntu-latest
    needs: [build, provision]
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ needs.provision.outputs.droplet_ip }} >> ~/.ssh/known_hosts

      - name: Copy deployment files to droplet
        run: |
          scp -i ~/.ssh/id_rsa docker-compose.prod.yml \
            root@${{ needs.provision.outputs.droplet_ip }}:/opt/egtraining/docker-compose.yml
          scp -i ~/.ssh/id_rsa image.tar.gz \
            root@${{ needs.provision.outputs.droplet_ip }}:/opt/egtraining/

      - name: Deploy on droplet
        run: |
          ssh -i ~/.ssh/id_rsa root@${{ needs.provision.outputs.droplet_ip }} << 'ENDSSH'
            set -e
            cd /opt/egtraining

            echo "📦 Loading Docker image..."
            docker load < image.tar.gz

            echo "🔄 Pulling latest images..."
            docker-compose pull --ignore-pull-failures || true

            echo "⬇️  Stopping old containers..."
            docker-compose down --remove-orphans || true

            echo "🚀 Starting new containers..."
            IMAGE_TAG=${{ github.sha }} docker-compose up -d

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "✅ Deployment complete!"
          ENDSSH

      - name: Health check
        run: |
          IP=${{ needs.provision.outputs.droplet_ip }}
          echo "🔍 Running health checks on http://$IP:${{ env.APP_PORT }}"
          sleep 15

          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$IP:${{ env.APP_PORT }}/ || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [[ "$STATUS" == "200" || "$STATUS" == "301" || "$STATUS" == "302" ]]; then
              echo "✅ Application is UP and responding!"
              echo "🌐 Access at: http://$IP:${{ env.APP_PORT }}"
              exit 0
            fi
            sleep 10
          done

          echo "❌ Health check failed after 10 attempts"
          exit 1

      - name: Post deployment summary
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Droplet IP | \`${{ needs.provision.outputs.droplet_ip }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| App URL | http://${{ needs.provision.outputs.droplet_ip }}:${{ env.APP_PORT }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | BLR1 (Bangalore) |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────
  # JOB 4: Destroy (manual trigger only)
  # ─────────────────────────────────────────────────
  destroy:
    name: 💣 Destroy Droplet (Cost Saving)
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Destroy droplet
        run: |
          echo "💣 Destroying droplet: ${{ env.DROPLET_NAME }}"
          doctl compute droplet delete ${{ env.DROPLET_NAME }} --force
          echo "✅ Droplet destroyed. No more billing!"

      - name: Summary
        run: |
          echo "## 💣 Droplet Destroyed" >> $GITHUB_STEP_SUMMARY
          echo "Droplet **${{ env.DROPLET_NAME }}** has been destroyed." >> $GITHUB_STEP_SUMMARY
          echo "To redeploy: trigger workflow with action = **create-and-deploy**" >> $GITHUB_STEP_SUMMARY
